name: Build & Release v0.1.17

# Builds the CorpusMind desktop app for Linux, macOS, and Windows on
# platform-native GitHub Actions runners, then uploads all artifacts to
# the GitHub release.
#
# Each platform job:
#   1. Sets up Python 3.12 + Rust + Node.js
#   2. Installs engine dependencies + spaCy model
#   3. Builds the engine sidecar with PyInstaller (produces ~60 MB binary)
#   4. Copies the sidecar into the Tauri binaries directory
#   5. Builds the web frontend
#   6. Runs `tauri build` to produce the platform installer
#   7. Uploads the installer to the GitHub release
#
# Trigger: manually via "Run workflow" in the Actions tab, or automatically
# when a v0.1.* tag is pushed.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.17)'
        required: true
        default: 'v0.1.17'
  push:
    tags:
      - 'v0.1.*'

permissions:
  contents: write  # needed to upload assets to the release

jobs:
  # ─── Linux (deb + AppImage) ──────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsystemd-dev \
            patchelf \
            file

      - name: Install engine dependencies + PyInstaller
        run: |
          cd engine
          pip install -e ".[dev,vision]"
          pip install cairosvg python-multipart
          pip install pyinstaller
          python -m spacy download en_core_web_sm

      - name: Build engine sidecar (PyInstaller)
        run: |
          cd engine
          pyinstaller corpusmind-engine.spec --noconfirm
          echo "=== Sidecar contents ==="
          ls -la dist/corpusmind-engine/
          du -sh dist/corpusmind-engine/

      - name: Copy sidecar to Tauri binaries directory
        run: |
          python -c "import shutil; shutil.rmtree('desktop/src-tauri/binaries/corpusmind-engine', ignore_errors=True); shutil.copytree('engine/dist/corpusmind-engine', 'desktop/src-tauri/binaries/corpusmind-engine')"
          echo "=== Tauri binaries dir ==="
          ls -la desktop/src-tauri/binaries/corpusmind-engine/

      - name: Build web frontend
        run: |
          cd web
          npm install --no-audit --no-fund
          npm run build

      - name: Build Tauri app (deb + AppImage)
        run: |
          cd desktop/src-tauri
          npx @tauri-apps/cli@latest build --bundles deb,appimage

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage

  # ─── macOS (DMG, arm64) ──────────────────────────────────────────
  build-macos:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install engine dependencies + PyInstaller
        run: |
          cd engine
          pip install -e ".[dev,vision]"
          pip install cairosvg python-multipart
          pip install pyinstaller
          python -m spacy download en_core_web_sm

      - name: Build engine sidecar (PyInstaller)
        run: |
          cd engine
          pyinstaller corpusmind-engine.spec --noconfirm
          echo "=== Sidecar contents ==="
          ls -la dist/corpusmind-engine/
          du -sh dist/corpusmind-engine/

      - name: Copy sidecar to Tauri binaries directory
        run: |
          python -c "import shutil; shutil.rmtree('desktop/src-tauri/binaries/corpusmind-engine', ignore_errors=True); shutil.copytree('engine/dist/corpusmind-engine', 'desktop/src-tauri/binaries/corpusmind-engine')"
          echo "=== Tauri binaries dir ==="
          ls -la desktop/src-tauri/binaries/corpusmind-engine/

      - name: Build web frontend
        run: |
          cd web
          npm install --no-audit --no-fund
          npm run build

      - name: Build Tauri app (Universal DMG)
        run: |
          cd desktop/src-tauri
          npx @tauri-apps/cli@latest build --bundles dmg --target universal-apple-darwin

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  # ─── Windows (NSIS + MSI) ────────────────────────────────────────
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install engine dependencies + PyInstaller
        run: |
          cd engine
          pip install -e ".[dev,vision]"
          pip install cairosvg python-multipart
          pip install pyinstaller
          python -m spacy download en_core_web_sm
        shell: bash

      - name: Build engine sidecar (PyInstaller)
        run: |
          cd engine
          pyinstaller corpusmind-engine.spec --noconfirm
          echo "=== Sidecar contents ==="
          ls -la dist/corpusmind-engine/
          du -sh dist/corpusmind-engine/
        shell: bash

      - name: Copy sidecar to Tauri binaries directory
        run: |
          python -c "import shutil; shutil.rmtree('desktop/src-tauri/binaries/corpusmind-engine', ignore_errors=True); shutil.copytree('engine/dist/corpusmind-engine', 'desktop/src-tauri/binaries/corpusmind-engine')"
          echo "=== Tauri binaries dir ==="
          ls -la desktop/src-tauri/binaries/corpusmind-engine/
        shell: bash

      - name: Build web frontend
        run: |
          cd web
          npm install --no-audit --no-fund
          npm run build
        shell: bash

      - name: Build Tauri app (NSIS + MSI)
        run: |
          cd desktop/src-tauri
          npx @tauri-apps/cli@latest build --bundles nsis,msi
        shell: bash

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi

  # ─── Web PWA (zip) ───────────────────────────────────────────────
  build-web:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web frontend
        run: |
          cd web
          npm install --no-audit --no-fund
          npm run build

      - name: Zip web dist
        run: |
          cd web
          zip -r ../corpusmind-web-v0.1.17.zip dist/

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: corpusmind-web-v0.1.17.zip
