name: Build & Release v0.1.16

# Builds the CorpusMind desktop app for Linux, macOS, and Windows on
# platform-native GitHub Actions runners, then uploads all artifacts to
# the GitHub release.
#
# Why this workflow exists:
#   Cross-compiling Tauri apps from a single Linux machine is not possible:
#     - macOS requires the Apple SDK (licensing restrictions prevent redistribution)
#     - Windows requires the MSVC linker (doesn't run on Linux)
#     - The Linux release build needs ≥8GB RAM for the final link step
#   GitHub Actions runners have 7-16GB RAM and the native toolchain preinstalled.
#
# Trigger: manually via "Run workflow" in the Actions tab, or automatically
# when a v0.1.* tag is pushed.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.16)'
        required: true
        default: 'v0.1.16'
  push:
    tags:
      - 'v0.1.*'

permissions:
  contents: write  # needed to upload assets to the release

jobs:
  # ─── Linux (deb + AppImage) ──────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" || npm install -g @tauri-apps/cli

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      - name: Build web frontend
        run: |
          cd web
          npm install --no-audit --no-fund
          npm run build

      - name: Create placeholder binaries dir
        run: |
          mkdir -p desktop/src-tauri/binaries/corpusmind-engine
          echo "# Placeholder — engine runs as separate process" > desktop/src-tauri/binaries/corpusmind-engine/README.txt

      - name: Build Tauri app (deb + AppImage)
        run: |
          cd desktop/src-tauri
          tauri build --bundles deb,appimage
        env:
          # The Linux release build needs these for the linker to find systemd symbols
          RUSTFLAGS: "-C link-arg=-lsystemd"

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage

  # ─── macOS (DMG) ─────────────────────────────────────────────────
  build-macos:
    runs-on: macos-14  # Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" || npm install -g @tauri-apps/cli

      - name: Build web frontend
        run: |
          cd web
          npm install --no-audit --no-fund
          npm run build

      - name: Create placeholder binaries dir
        run: |
          mkdir -p desktop/src-tauri/binaries/corpusmind-engine
          echo "# Placeholder — engine runs as separate process" > desktop/src-tauri/binaries/corpusmind-engine/README.txt

      - name: Build Tauri app (Universal DMG)
        run: |
          cd desktop/src-tauri
          tauri build --bundles dmg --target universal-apple-darwin
        # Note: universal-apple-darwin produces a fat binary that runs on
        # both Intel and Apple Silicon Macs. If you want separate builds,
        # use --target aarch64-apple-darwin and --target x86_64-apple-darwin.

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  # ─── Windows (NSIS + MSI) ────────────────────────────────────────
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"
        shell: bash

      - name: Build web frontend
        run: |
          cd web
          npm install --no-audit --no-fund
          npm run build
        shell: bash

      - name: Create placeholder binaries dir
        run: |
          mkdir -p desktop/src-tauri/binaries/corpusmind-engine
          echo "# Placeholder — engine runs as separate process" > desktop/src-tauri/binaries/corpusmind-engine/README.txt
        shell: bash

      - name: Build Tauri app (NSIS + MSI)
        run: |
          cd desktop/src-tauri
          tauri build --bundles nsis,msi
        shell: bash

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi

  # ─── Web PWA (zip) ───────────────────────────────────────────────
  build-web:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build web frontend
        run: |
          cd web
          npm install --no-audit --no-fund
          npm run build

      - name: Zip web dist
        run: |
          cd web
          zip -r ../corpusmind-web-v0.1.16.zip dist/

      - name: Upload artifact to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: corpusmind-web-v0.1.16.zip
