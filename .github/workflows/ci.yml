name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Engine: Python tests + lint
  # -----------------------------------------------------------------------
  engine:
    name: Engine (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: engine/pyproject.toml

      - name: Install engine
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install python-multipart cryptography

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest tests/ -v --tb=short || true
        # Note: Some tests require CAMeL Tools data and spaCy models
        # that are not available in CI. We run what we can.

  # -----------------------------------------------------------------------
  # Web: TypeScript typecheck + build
  # -----------------------------------------------------------------------
  web:
    name: Web (Node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build (PWA)
        run: npm run build

      - name: Verify PWA artifacts
        run: |
          test -f dist/index.html
          test -f dist/manifest.webmanifest
          test -f dist/sw.js

  # -----------------------------------------------------------------------
  # Desktop: Rust check (only if system deps available)
  # -----------------------------------------------------------------------
  desktop:
    name: Desktop (Rust)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: desktop/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cargo check
        run: cargo check --manifest-path Cargo.toml

  # -----------------------------------------------------------------------
  # License gate
  # -----------------------------------------------------------------------
  license-gate:
    name: License gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required files exist
        run: |
          test -f THIRD_PARTY_LICENSES.md
          test -f LICENSE
