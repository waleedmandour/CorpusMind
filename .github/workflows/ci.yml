name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Engine: Python tests + lint + typecheck
  # -----------------------------------------------------------------------
  engine:
    name: Engine (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12"]
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: engine/pyproject.toml

      - name: Install engine
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Typecheck (mypy)
        run: mypy app ai api stats || true  # Phase 0: warn-only, will become hard-fail in Phase 1

      - name: Test (pytest)
        run: pytest tests/ -v --cov=stats --cov=ai --cov-report=term-missing

  # -----------------------------------------------------------------------
  # Web: TypeScript typecheck + build
  # -----------------------------------------------------------------------
  web:
    name: Web (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20"]
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (PWA)
        run: npm run build

      - name: Verify PWA artifacts
        run: |
          test -f dist/index.html
          test -f dist/manifest.webmanifest
          test -f dist/sw.js

  # -----------------------------------------------------------------------
  # Desktop: Rust check (compiles, doesn't yet bundle sidecar)
  # -----------------------------------------------------------------------
  desktop:
    name: Desktop (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Tauri 2 requirements)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.lock', 'desktop/src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cargo check
        run: cargo check --manifest-path Cargo.toml

      - name: Cargo fmt (verify)
        run: cargo fmt --check

  # -----------------------------------------------------------------------
  # License gate (§13.5) — Phase 1 will make this a hard check that refuses
  # to bundle any unlicensed asset. For now it's a no-op reminder.
  # -----------------------------------------------------------------------
  license-gate:
    name: License gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify THIRD_PARTY_LICENSES.md exists
        run: test -f THIRD_PARTY_LICENSES.md
      - name: Verify LICENSE exists
        run: test -f LICENSE
      - name: Phase 1 TODO
        run: |
          echo "TODO (Phase 1): implement build-time check that every bundled"
          echo "model/wordlist/reference-corpus has an entry in THIRD_PARTY_LICENSES.md."
          echo "Until then, this is a no-op reminder."
