name: Release

# Build and publish platform installers when a version tag is pushed.
#
# Trigger:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Each job builds one platform, uploads its installer to the GitHub Release,
# and produces a checksum file. The Zenodo GitHub integration can then archive
# the release (see docs/ZENODO_DOI_GUIDE.md).
#
# Note on signing:
#   - macOS / Windows builds are UNSIGNED by default. Users get the
#     "unidentified developer" warning. To sign, set the repository secrets
#     listed in the per-job steps below.
#   - Linux builds target AppImage + .deb for x86_64 and arm64.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 0.1.0) — also used as release name"
        required: true

permissions:
  contents: write   # needed by softprops/action-gh-release to upload assets

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # macOS Apple Silicon (arm64)
  # ──────────────────────────────────────────────────────────────────────
  macos-arm64:
    name: macOS (Apple Silicon)
    runs-on: macos-14   # M1 runner — GitHub-hosted, available since 2024
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust (stable, aarch64-apple-darwin)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: macos-arm64-cargo-${{ hashFiles('desktop/src-tauri/Cargo.toml') }}
          restore-keys: macos-arm64-cargo-

      - name: Install PyInstaller + engine deps
        working-directory: engine
        run: |
          python -m pip install --upgrade pip wheel
          pip install pyinstaller python-multipart cryptography
          pip install -e ".[dev,vision]"

      - name: Build engine sidecar (PyInstaller)
        working-directory: engine
        run: pyinstaller corpusmind-engine.spec --noconfirm

      - name: Stage sidecar for Tauri
        working-directory: desktop/src-tauri
        run: |
          mkdir -p binaries
          cp ../../engine/dist/corpusmind-engine \
             binaries/corpusmind-engine-aarch64-apple-darwin
          chmod +x binaries/corpusmind-engine-aarch64-apple-darwin
          ls -lh binaries/

      - name: Build web PWA
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Build Tauri app (arm64)
        working-directory: desktop/src-tauri
        env:
          # Codesigning is OPTIONAL. If the secrets are absent the build still
          # succeeds — the .app / .dmg will just be unsigned.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            # Import the signing certificate from a base64-encoded secret.
            echo "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" | base64 --decode > cert.p12
            security create-keychain -p build build.keychain
            security import cert.p12 -k build.keychain -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k build build.keychain
            security list-keychains -d user -s build.keychain
            export CI=1
          fi
          cargo tauri build --target aarch64-apple-darwin

      - name: Notarize + staple (if signing secrets are present)
        if: ${{ secrets.APPLE_ID != '' }}
        working-directory: desktop/src-tauri
        run: |
          DMG=$(find target/aarch64-apple-darwin/release/bundle/dmg -name '*.dmg' | head -1)
          if [ -z "$DMG" ]; then echo "no dmg found"; exit 1; fi
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: false

  # ──────────────────────────────────────────────────────────────────────
  # macOS Intel (x86_64) — optional, for older Macs
  # ──────────────────────────────────────────────────────────────────────
  macos-intel:
    name: macOS (Intel)
    runs-on: macos-13   # Intel runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install PyInstaller + engine deps
        working-directory: engine
        run: |
          python -m pip install --upgrade pip wheel
          pip install pyinstaller python-multipart cryptography
          pip install -e ".[dev,vision]"

      - name: Build engine sidecar
        working-directory: engine
        run: pyinstaller corpusmind-engine.spec --noconfirm

      - name: Stage sidecar
        working-directory: desktop/src-tauri
        run: |
          mkdir -p binaries
          cp ../../engine/dist/corpusmind-engine binaries/corpusmind-engine-x86_64-apple-darwin
          chmod +x binaries/corpusmind-engine-x86_64-apple-darwin

      - name: Build web PWA
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Build Tauri app (x86_64)
        working-directory: desktop/src-tauri
        run: cargo tauri build --target x86_64-apple-darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: false

  # ──────────────────────────────────────────────────────────────────────
  # Windows x86_64
  # ──────────────────────────────────────────────────────────────────────
  windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable

      - name: Install PyInstaller + engine deps
        working-directory: engine
        run: |
          python -m pip install --upgrade pip wheel
          pip install pyinstaller python-multipart cryptography
          pip install -e ".[dev,vision]"

      - name: Build engine sidecar
        working-directory: engine
        run: pyinstaller corpusmind-engine.spec --noconfirm

      - name: Stage sidecar
        working-directory: desktop/src-tauri
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path binaries | Out-Null
          Copy-Item ..\..\engine\dist\corpusmind-engine.exe `
                    binaries\corpusmind-engine-x86_64-pc-windows-msvc.exe
          Get-ChildItem binaries/

      - name: Build web PWA
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Build Tauri app (NSIS + MSI)
        working-directory: desktop/src-tauri
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
          fail_on_unmatched_files: false

  # ──────────────────────────────────────────────────────────────────────
  # Linux x86_64 (AppImage + deb)
  # ──────────────────────────────────────────────────────────────────────
  linux:
    name: Linux (x64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libfuse2

      - name: Install PyInstaller + engine deps
        working-directory: engine
        run: |
          python -m pip install --upgrade pip wheel
          pip install pyinstaller python-multipart cryptography
          pip install -e ".[dev,vision]"

      - name: Build engine sidecar
        working-directory: engine
        run: pyinstaller corpusmind-engine.spec --noconfirm

      - name: Stage sidecar
        working-directory: desktop/src-tauri
        run: |
          mkdir -p binaries
          cp ../../engine/dist/corpusmind-engine binaries/corpusmind-engine-x86_64-unknown-linux-gnu
          chmod +x binaries/corpusmind-engine-x86_64-unknown-linux-gnu

      - name: Build web PWA
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Build Tauri app (AppImage + deb)
        working-directory: desktop/src-tauri
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/deb/*.deb

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/deb/*.deb
          fail_on_unmatched_files: false

  # ──────────────────────────────────────────────────────────────────────
  # Checksums — produce a single SHA256SUMS file for the release
  # ──────────────────────────────────────────────────────────────────────
  checksums:
    name: Release checksums
    needs: [macos-arm64, macos-intel, windows, linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate SHA256SUMS
        run: |
          find artifacts -type f \( -name '*.dmg' -o -name '*.exe' -o -name '*.msi' -o -name '*.AppImage' -o -name '*.deb' \) -print0 \
            | xargs -0 sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Attach checksums to release
        uses: softprops/action-gh-release@v2
        with:
          files: SHA256SUMS.txt
