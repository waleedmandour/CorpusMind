name: Release

# Build and publish platform installers when a version tag is pushed.
# Trigger: git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Windows x86_64
  # ──────────────────────────────────────────────────────────────────────
  windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0' --locked

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: windows-cargo-${{ hashFiles('desktop/src-tauri/Cargo.toml') }}
          restore-keys: windows-cargo-

      - name: Install PyInstaller + engine deps (production only)
        working-directory: engine
        run: |
          python -m pip install --upgrade pip wheel
          pip install pyinstaller python-multipart cryptography
          # Install CORE engine deps only — NOT [dev,vision].
          # [dev] pulls in pytest/ruff/mypy (not needed in production).
          # [vision] pulls in opencv-python (~60MB compiled) which makes
          # PyInstaller extremely slow. We install pillow directly instead
          # since the vision module only needs PIL (cv2 is a lazy import
          # for the optional facial analysis feature).
          pip install -e .
          pip install pillow

      - name: Build engine sidecar (PyInstaller)
        working-directory: engine
        run: pyinstaller corpusmind-engine.spec --noconfirm --log-level WARN

      - name: Stage sidecar for Tauri (onedir)
        working-directory: desktop/src-tauri
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path binaries | Out-Null
          Copy-Item ..\..\engine\dist\corpusmind-engine `
                    binaries\corpusmind-engine -Recurse -Force
          Write-Host "Staged sidecar directory:"
          Get-ChildItem binaries/corpusmind-engine/ | Format-Table Name, Length

      - name: Build web PWA
        working-directory: web
        env:
          # Bake the engine sidecar's fixed address into the bundle so the
          # Tauri webview (served from http://tauri.localhost on Windows,
          # with no Vite dev proxy) can reach http://127.0.0.1:8765.
          # See web/src/lib/api.ts for the full story.
          VITE_ENGINE_URL: http://127.0.0.1:8765
        run: |
          npm install
          npm run build

      - name: Build Tauri app (NSIS + MSI)
        working-directory: desktop/src-tauri
        run: cargo tauri build

      - name: Verify installer size
        shell: pwsh
        run: |
          $msi = Get-ChildItem desktop/src-tauri/target/release/bundle/msi/*.msi | Select-Object -First 1
          $exe = Get-ChildItem desktop/src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          if ($msi) { Write-Host "MSI: $($msi.Name) - $([math]::Round($msi.Length / 1MB, 1)) MB" }
          if ($exe) { Write-Host "NSIS: $($exe.Name) - $([math]::Round($exe.Length / 1MB, 1)) MB" }
          if (-not $msi -and -not $exe) { Write-Host "ERROR: No installers produced"; exit 1 }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
          fail_on_unmatched_files: false
          generate_release_notes: true

  # ──────────────────────────────────────────────────────────────────────
  # macOS Apple Silicon (arm64)
  # ──────────────────────────────────────────────────────────────────────
  macos-arm64:
    name: macOS (Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust (stable, aarch64-apple-darwin)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0' --locked

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: macos-arm64-cargo-${{ hashFiles('desktop/src-tauri/Cargo.toml') }}
          restore-keys: macos-arm64-cargo-

      - name: Install PyInstaller + engine deps (production only)
        working-directory: engine
        run: |
          python -m pip install --upgrade pip wheel
          pip install pyinstaller python-multipart cryptography
          pip install -e .
          pip install pillow

      - name: Build engine sidecar (PyInstaller)
        working-directory: engine
        run: pyinstaller corpusmind-engine.spec --noconfirm --log-level WARN

      - name: Stage sidecar for Tauri (onedir)
        working-directory: desktop/src-tauri
        run: |
          mkdir -p binaries
          cp -r ../../engine/dist/corpusmind-engine binaries/corpusmind-engine
          chmod +x binaries/corpusmind-engine/corpusmind-engine
          ls -lh binaries/corpusmind-engine/

      - name: Build web PWA
        working-directory: web
        env:
          # Bake the engine sidecar's fixed address into the bundle so the
          # Tauri webview (served from tauri://localhost on macOS, with no
          # Vite dev proxy) can reach http://127.0.0.1:8765.
          # See web/src/lib/api.ts for the full story.
          VITE_ENGINE_URL: http://127.0.0.1:8765
        run: |
          npm install
          npm run build

      - name: Build Tauri app (arm64)
        working-directory: desktop/src-tauri
        run: cargo tauri build --target aarch64-apple-darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: false

  # ──────────────────────────────────────────────────────────────────────
  # Linux x86_64 (AppImage + deb)
  # ──────────────────────────────────────────────────────────────────────
  linux:
    name: Linux (x64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0' --locked

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libfuse2

      - name: Install PyInstaller + engine deps (production only)
        working-directory: engine
        run: |
          python -m pip install --upgrade pip wheel
          pip install pyinstaller python-multipart cryptography
          pip install -e .
          pip install pillow

      - name: Build engine sidecar (PyInstaller)
        working-directory: engine
        run: pyinstaller corpusmind-engine.spec --noconfirm --log-level WARN

      - name: Stage sidecar for Tauri (onedir)
        working-directory: desktop/src-tauri
        run: |
          mkdir -p binaries
          # PyInstaller onedir mode produces dist/corpusmind-engine/ directory
          cp -r ../../engine/dist/corpusmind-engine binaries/corpusmind-engine
          chmod +x binaries/corpusmind-engine/corpusmind-engine
          ls -lh binaries/corpusmind-engine/

      - name: Build web PWA
        working-directory: web
        env:
          # Bake the engine sidecar's fixed address into the bundle so the
          # Tauri webview (served from tauri://localhost on Linux, with no
          # Vite dev proxy) can reach http://127.0.0.1:8765.
          # See web/src/lib/api.ts for the full story.
          VITE_ENGINE_URL: http://127.0.0.1:8765
        run: |
          npm install
          npm run build

      - name: Build Tauri app (AppImage + deb)
        working-directory: desktop/src-tauri
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/deb/*.deb

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/deb/*.deb
          fail_on_unmatched_files: false
