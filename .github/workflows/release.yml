name: Release

# Build and publish platform installers when a version tag is pushed.
# Trigger: git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

# Cancel any in-progress release build when a new tag is pushed. This prevents
# two release runs from competing for the same GitHub Release and avoids
# wasting runner minutes on a superseded build.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Windows x86_64
  # ──────────────────────────────────────────────────────────────────────
  windows:
    name: Windows (x64)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0' --locked

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: windows-cargo-${{ hashFiles('desktop/src-tauri/Cargo.toml') }}
          restore-keys: windows-cargo-

      - name: Install PyInstaller + engine deps (production only)
        working-directory: engine
        run: |
          python -m pip install --upgrade pip wheel
          pip install pyinstaller python-multipart cryptography
          # Install CORE engine deps only — NOT [dev,vision].
          # [dev] pulls in pytest/ruff/mypy (not needed in production).
          # [vision] pulls in opencv-python (~60MB compiled) which makes
          # PyInstaller extremely slow. We install pillow directly instead
          # since the vision module only needs PIL (cv2 is a lazy import
          # for the optional facial analysis feature).
          pip install -e .
          pip install pillow

      - name: Download spaCy model (en_core_web_sm)
        working-directory: engine
        run: |
          python -m spacy download en_core_web_sm
          python -c "import en_core_web_sm; print('spaCy model OK:', en_core_web_sm.__version__)"

      - name: Exclude build dirs from Windows Defender (speed up PyInstaller)
        shell: pwsh
        run: |
          # Windows Defender real-time scanning is the #1 cause of slow
          # PyInstaller builds on Windows — it scans every file as it's
          # written, adding 3-10x overhead. Excluding the build dirs is
          # the standard CI workaround. This is safe in CI because the
          # runner is ephemeral and disposed after the job.
          $dirs = @(
            "engine\build",
            "engine\dist",
            "$env:TEMP\pyinstaller",
            "$env:LOCALAPPDATA\pyinstaller"
          )
          foreach ($d in $dirs) {
            if (Test-Path $d) {
              Add-MpPreference -ExclusionPath $d -ErrorAction SilentlyContinue
            }
          }
          # Also exclude the engine directory itself (where pip installs)
          Add-MpPreference -ExclusionPath (Get-Location).Path -ErrorAction SilentlyContinue
          Write-Host "Windows Defender exclusions added for build directories"

      - name: Build engine sidecar (PyInstaller)
        working-directory: engine
        timeout-minutes: 20
        run: pyinstaller corpusmind-engine.spec --noconfirm --clean --log-level WARN

      - name: Stage sidecar for Tauri (onedir)
        working-directory: desktop/src-tauri
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path binaries | Out-Null
          Copy-Item ..\..\engine\dist\corpusmind-engine `
                    binaries\corpusmind-engine -Recurse -Force
          Write-Host "Staged sidecar directory:"
          Get-ChildItem binaries/corpusmind-engine/ | Format-Table Name, Length
          # Verify the main executable exists in the staged directory
          $exePath = "binaries\corpusmind-engine\corpusmind-engine.exe"
          if (-not (Test-Path $exePath)) {
            Write-Host "ERROR: Sidecar exe not found at $exePath" -ForegroundColor Red
            Write-Host "Contents of binaries/corpusmind-engine/:"
            Get-ChildItem binaries/corpusmind-engine/ -Recurse | Select-Object FullName
            exit 1
          }
          Write-Host "OK: Sidecar exe verified at $exePath" -ForegroundColor Green

      - name: Verify VC++ runtime DLLs are bundled
        shell: pwsh
        run: |
          # FIX 4: numpy/scipy/spaCy's compiled extensions require these at load time.
          # If the build machine doesn't have them, or PyInstaller's dependency
          # walker misses them, the shipped .exe fails to launch on end-user
          # machines with ZERO output (the failure happens before Python starts,
          # so even stderr — which is always unbuffered since Python 3.9 — stays
          # empty). Catch this at build time, not after a user reports it.
          $internalDir = "desktop\src-tauri\binaries\corpusmind-engine\_internal"
          $required = @("vcruntime140.dll", "vcruntime140_1.dll", "msvcp140.dll")
          $missing = @()
          foreach ($dll in $required) {
            $found = Get-ChildItem -Path $internalDir -Filter $dll -Recurse -ErrorAction SilentlyContinue
            if (-not $found) { $missing += $dll }
          }
          if ($missing.Count -gt 0) {
            Write-Host "ERROR: Missing required runtime DLLs: $($missing -join ', ')" -ForegroundColor Red
            Write-Host "The build will produce an installer that fails to launch on machines without the VC++ Redistributable pre-installed, with no diagnostic output." -ForegroundColor Red
            exit 1
          }
          Write-Host "OK: all required VC++ runtime DLLs are bundled" -ForegroundColor Green

      - name: Verify spaCy model is bundled
        shell: pwsh
        run: |
          # Verify that the en_core_web_sm spaCy model was bundled correctly.
          # Without it, corpus upload fails with [E050] Can't find model.
          $internalDir = "desktop\src-tauri\binaries\corpusmind-engine\_internal"
          $modelDir = Join-Path $internalDir "en_core_web_sm"
          $metaFile = Join-Path $modelDir "meta.json"
          if (-not (Test-Path $metaFile)) {
            Write-Host "ERROR: spaCy model en_core_web_sm not bundled!" -ForegroundColor Red
            Write-Host "Expected: $metaFile" -ForegroundColor Red
            Write-Host "Contents of _internal/:" -ForegroundColor Yellow
            Get-ChildItem $internalDir -Directory | Select-Object Name | Format-Table
            exit 1
          }
          $size = (Get-ChildItem $modelDir -Recurse | Measure-Object -Property Length -Sum).Sum
          $sizeMB = [math]::Round($size / 1MB, 1)
          Write-Host "OK: spaCy model en_core_web_sm bundled ($sizeMB MB)" -ForegroundColor Green
          # Also verify the versioned subdirectory exists
          $versionedDir = Get-ChildItem $modelDir -Directory | Where-Object { $_.Name -like "en_core_web_sm-*" } | Select-Object -First 1
          if (-not $versionedDir) {
            Write-Host "WARNING: No versioned subdirectory found in en_core_web_sm" -ForegroundColor Yellow
          } else {
            Write-Host "OK: Versioned model dir: $($versionedDir.Name)" -ForegroundColor Green
          }

      - name: Build web PWA
        working-directory: web
        env:
          # Bake the engine sidecar's fixed address into the bundle so the
          # Tauri webview (served from http://tauri.localhost on Windows,
          # with no Vite dev proxy) can reach http://127.0.0.1:8765.
          # See web/src/lib/api.ts for the full story.
          VITE_ENGINE_URL: http://127.0.0.1:8765
        run: |
          npm install
          npm run build

      - name: Build Tauri app (NSIS + MSI)
        working-directory: desktop/src-tauri
        run: cargo tauri build

      - name: Verify installer size
        shell: pwsh
        run: |
          $exe = Get-ChildItem desktop/src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          $msi = Get-ChildItem desktop/src-tauri/target/release/bundle/msi/*.msi | Select-Object -First 1
          if ($exe) { Write-Host "NSIS (per-user, no admin required): $($exe.Name) - $([math]::Round($exe.Length / 1MB, 1)) MB" }
          if ($msi) { Write-Host "MSI (per-machine, requires admin): $($msi.Name) - $([math]::Round($msi.Length / 1MB, 1)) MB" }
          if (-not $exe -and -not $msi) { Write-Host "ERROR: No installers produced"; exit 1 }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
          fail_on_unmatched_files: false
          generate_release_notes: true

  # ──────────────────────────────────────────────────────────────────────
  # macOS Apple Silicon (arm64)
  # ──────────────────────────────────────────────────────────────────────
  macos-arm64:
    name: macOS (Apple Silicon)
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust (stable, aarch64-apple-darwin)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0' --locked

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: macos-arm64-cargo-${{ hashFiles('desktop/src-tauri/Cargo.toml') }}
          restore-keys: macos-arm64-cargo-

      - name: Install PyInstaller + engine deps (production only)
        working-directory: engine
        run: |
          python -m pip install --upgrade pip wheel
          pip install pyinstaller python-multipart cryptography
          pip install -e .
          pip install pillow

      - name: Download spaCy model (en_core_web_sm)
        working-directory: engine
        run: |
          python -m spacy download en_core_web_sm
          python -c "import en_core_web_sm; print('spaCy model OK:', en_core_web_sm.__version__)"

      - name: Build engine sidecar (PyInstaller)
        working-directory: engine
        run: pyinstaller corpusmind-engine.spec --noconfirm --clean --log-level WARN

      - name: Stage sidecar for Tauri (onedir)
        working-directory: desktop/src-tauri
        run: |
          mkdir -p binaries
          cp -r ../../engine/dist/corpusmind-engine binaries/corpusmind-engine
          chmod +x binaries/corpusmind-engine/corpusmind-engine
          ls -lh binaries/corpusmind-engine/
          # Verify the main executable exists
          if [ ! -f binaries/corpusmind-engine/corpusmind-engine ]; then
            echo "ERROR: Sidecar binary not found!"
            find binaries/corpusmind-engine/ -type f
            exit 1
          fi
          echo "OK: Sidecar binary verified"

      - name: Verify spaCy model is bundled
        run: |
          model_dir="desktop/src-tauri/binaries/corpusmind-engine/_internal/en_core_web_sm"
          if [ ! -f "$model_dir/meta.json" ]; then
            echo "ERROR: spaCy model en_core_web_sm not bundled!"
            ls -la "desktop/src-tauri/binaries/corpusmind-engine/_internal/" || true
            exit 1
          fi
          size=$(du -sh "$model_dir" | cut -f1)
          echo "OK: spaCy model bundled ($size)"

      - name: Build web PWA
        working-directory: web
        env:
          # Bake the engine sidecar's fixed address into the bundle so the
          # Tauri webview (served from tauri://localhost on macOS, with no
          # Vite dev proxy) can reach http://127.0.0.1:8765.
          # See web/src/lib/api.ts for the full story.
          VITE_ENGINE_URL: http://127.0.0.1:8765
        run: |
          npm install
          npm run build

      - name: Build Tauri app (arm64)
        working-directory: desktop/src-tauri
        run: cargo tauri build --target aarch64-apple-darwin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: false

  # ──────────────────────────────────────────────────────────────────────
  # Linux x86_64 (AppImage + deb)
  # ──────────────────────────────────────────────────────────────────────
  linux:
    name: Linux (x64)
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2.0' --locked

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libfuse2

      - name: Install PyInstaller + engine deps (production only)
        working-directory: engine
        run: |
          python -m pip install --upgrade pip wheel
          pip install pyinstaller python-multipart cryptography
          pip install -e .
          pip install pillow

      - name: Download spaCy model (en_core_web_sm)
        working-directory: engine
        run: |
          python -m spacy download en_core_web_sm
          python -c "import en_core_web_sm; print('spaCy model OK:', en_core_web_sm.__version__)"

      - name: Build engine sidecar (PyInstaller)
        working-directory: engine
        run: pyinstaller corpusmind-engine.spec --noconfirm --clean --log-level WARN

      - name: Stage sidecar for Tauri (onedir)
        working-directory: desktop/src-tauri
        run: |
          mkdir -p binaries
          # PyInstaller onedir mode produces dist/corpusmind-engine/ directory
          cp -r ../../engine/dist/corpusmind-engine binaries/corpusmind-engine
          chmod +x binaries/corpusmind-engine/corpusmind-engine
          ls -lh binaries/corpusmind-engine/
          # Verify the main executable exists
          if [ ! -f binaries/corpusmind-engine/corpusmind-engine ]; then
            echo "ERROR: Sidecar binary not found!"
            find binaries/corpusmind-engine/ -type f
            exit 1
          fi
          echo "OK: Sidecar binary verified"

      - name: Verify spaCy model is bundled
        run: |
          model_dir="desktop/src-tauri/binaries/corpusmind-engine/_internal/en_core_web_sm"
          if [ ! -f "$model_dir/meta.json" ]; then
            echo "ERROR: spaCy model en_core_web_sm not bundled!"
            ls -la "desktop/src-tauri/binaries/corpusmind-engine/_internal/" || true
            exit 1
          fi
          size=$(du -sh "$model_dir" | cut -f1)
          echo "OK: spaCy model bundled ($size)"

      - name: Build web PWA
        working-directory: web
        env:
          # Bake the engine sidecar's fixed address into the bundle so the
          # Tauri webview (served from tauri://localhost on Linux, with no
          # Vite dev proxy) can reach http://127.0.0.1:8765.
          # See web/src/lib/api.ts for the full story.
          VITE_ENGINE_URL: http://127.0.0.1:8765
        run: |
          npm install
          npm run build

      - name: Build Tauri app (AppImage + deb)
        working-directory: desktop/src-tauri
        env:
          # linuxdeploy is itself an AppImage that needs FUSE to mount itself.
          # GitHub Actions Ubuntu runners have FUSE but fusermount often fails
          # with permission errors. This env var tells AppImage-based tools
          # (linuxdeploy, appimagetool) to extract to a temp dir instead of
          # mounting via FUSE — the standard CI workaround.
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: cargo tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
          fail_on_unmatched_files: false
